<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Manga Checker">
<title>Manga Checker</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
  :root {
    --bg: #0f1115;
    --surface: #181b22;
    --surface-2: #242934;
    --border: #2a2f3a;
    --text: #e8ebf0;
    --muted: #8b93a7;
    --accent: #7aa2f7;
    --accent-fg: #0f1115;
    --danger: #f7768e;
    --ok: #9ece6a;
    --warn: #e0af68;
    --shadow-pop: 0 8px 24px rgba(0, 0, 0, 0.35);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fa;
      --surface: #fff;
      --surface-2: #f0f2f6;
      --border: #e3e6ec;
      --text: #1a1d24;
      --muted: #5f6775;
      --accent: #3d5afe;
      --accent-fg: #fff;
      --danger: #d23f57;
      --ok: #2e8b3e;
      --warn: #b67214;
      --shadow-pop: 0 8px 24px rgba(10, 15, 30, 0.12);
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-size-adjust: 100%; -webkit-text-size-adjust: 100%;
  }
  a { color: var(--accent); }
  a:hover { text-decoration-thickness: 2px; text-underline-offset: 2px; }

  button {
    font: inherit; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text);
    padding: 8px 14px; border-radius: 8px; min-height: 44px;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: background-color 150ms ease-out, border-color 150ms ease-out,
                color 150ms ease-out, transform 100ms ease-out;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button:active:not(:disabled) { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  button.primary:hover:not(:disabled) { filter: brightness(1.08); }
  button.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--border)); }
  button.danger.armed { background: var(--danger); color: var(--accent-fg); border-color: var(--danger); }
  button.icon { min-width: 44px; padding: 8px; }

  input[type=text], input[type=number], input[type=password], input[type=url] {
    font: inherit; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; min-height: 44px; width: 100%;
    transition: border-color 150ms ease-out, background-color 150ms ease-out;
  }
  input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  input::placeholder { color: var(--muted); opacity: 0.55; }

  label { display: block; margin: 14px 0 4px; color: var(--muted); font-size: 13px; font-weight: 500; letter-spacing: 0.01em; }
  label.inline { display: inline-flex; align-items: center; gap: 10px; margin: 14px 0; font-size: 15px; color: var(--text); font-weight: 400; }
  label.inline input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
  code { background: var(--surface-2); padding: 1px 6px; border-radius: 4px; font-size: 0.92em; }

  .app {
    max-width: 720px; margin: 0 auto;
    padding: max(16px, env(safe-area-inset-top)) 16px calc(96px + env(safe-area-inset-bottom));
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
  }
  .header h1 { font-size: 18px; margin: 0; letter-spacing: -0.01em; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .meta { color: var(--muted); font-size: 13px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .meta a { color: inherit; text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 2px; }
  .meta a:hover { text-decoration-color: var(--accent); color: var(--text); }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot.ok   { background: var(--ok); }
  .dot.err  { background: var(--danger); }
  .dot.prog { background: var(--warn); animation: pulse 1.6s ease-in-out infinite; }
  .dot.idle { background: var(--muted); opacity: 0.5; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    animation: fadeIn 260ms ease-out both;
  }
  .card h2 { font-size: 16px; margin: 0 0 4px; letter-spacing: -0.005em; }
  .card .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  .status { font-size: 13px; color: var(--muted); display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .status .chip {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 999px; background: var(--surface-2); color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: saturate(160%) blur(12px);
    -webkit-backdrop-filter: saturate(160%) blur(12px);
    border-top: 1px solid var(--border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 8px; justify-content: center;
  }

  .error {
    color: var(--danger); padding: 12px 14px;
    background: color-mix(in srgb, var(--danger) 8%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--danger) 45%, var(--border));
    border-radius: 10px; margin-bottom: 14px; font-size: 14px;
  }

  .empty { text-align: center; padding: 72px 20px 48px; color: var(--muted); }
  .empty-emoji { font-size: 44px; opacity: 0.55; line-height: 1; margin-bottom: 14px; }
  .empty h3 { margin: 0 0 6px; font-size: 17px; color: var(--text); font-weight: 500; letter-spacing: -0.005em; }
  .empty p { margin: 0; font-size: 14px; }

  .skeleton {
    height: 88px; border-radius: 12px; margin-bottom: 10px;
    border: 1px solid var(--border);
    background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
  }

  .field-error { color: var(--danger); font-size: 13px; margin-top: 6px; }
  .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .hint-footnote { font-size: 13px; color: var(--muted); margin-top: 16px; }

  .gate {
    max-width: 440px; margin: 8vh auto 0; padding: 28px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    animation: fadeIn 320ms ease-out both;
  }
  .gate h1 { margin: 0 0 10px; font-size: 20px; letter-spacing: -0.01em; }
  .gate p { color: var(--muted); font-size: 14px; line-height: 1.55; }
  .gate-actions { margin-top: 18px; display: flex; justify-content: flex-end; }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55);
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0; z-index: 10;
    animation: fadeIn 180ms ease-out;
  }
  @media (min-width: 560px) {
    .modal-bg { align-items: center; padding: 16px; }
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px 16px 0 0; padding: 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    max-width: 480px; width: 100%;
    max-height: calc(100dvh - 32px); overflow-y: auto;
    box-shadow: var(--shadow-pop);
    animation: slideUp 200ms cubic-bezier(0.2, 0.8, 0.3, 1);
  }
  @media (min-width: 560px) { .modal { border-radius: 16px; } }
  .modal h2 { margin: 0 0 6px; font-size: 18px; letter-spacing: -0.01em; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast {
    position: fixed; top: calc(14px + env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%);
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); box-shadow: var(--shadow-pop);
    padding: 10px 16px; border-radius: 999px; font-size: 14px;
    z-index: 20; display: flex; align-items: center; gap: 8px;
    animation: toastIn 200ms ease-out;
    pointer-events: none;
  }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0;
  }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes toastIn { from { transform: translate(-50%, -8px); opacity: 0; } to { transform: translateX(-50%); opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React, { useState, useEffect, useCallback, useRef, useId, useMemo } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import htm from 'https://esm.sh/htm@3.1.1';
import yaml from 'https://esm.sh/js-yaml@4.1.0';

const h = htm.bind(React.createElement);

// ---------- repo targeting ----------
function detectRepo() {
  const host = location.hostname;
  const path = location.pathname.split('/').filter(Boolean);
  if (host.endsWith('.github.io') && path.length >= 1) {
    return { owner: host.split('.')[0], repo: path[0] };
  }
  return { owner: 'REPLACE_ME', repo: 'comic-checker' };
}
const REPO = detectRepo();
const WORKFLOW_FILE = 'check-manga.yml';
const BRANCH = 'master';

// ---------- GitHub API ----------
function makeApi(pat) {
  const base = `https://api.github.com/repos/${REPO.owner}/${REPO.repo}`;
  const headers = {
    'Authorization': `Bearer ${pat}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
  };

  async function request(url, opts = {}) {
    const r = await fetch(url, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    if (!r.ok) {
      const body = await r.text();
      const err = new Error(`${r.status} ${r.statusText}: ${body.slice(0, 200)}`);
      err.status = r.status;
      throw err;
    }
    if (r.status === 204) return null;
    return r.json();
  }

  const b64encode = (str) => btoa(unescape(encodeURIComponent(str)));
  const b64decode = (str) => decodeURIComponent(escape(atob(str.replace(/\n/g, ''))));

  return {
    async getContents(path) {
      const res = await request(`${base}/contents/${path}?ref=${BRANCH}`);
      return { text: b64decode(res.content), sha: res.sha };
    },
    async putContents(path, text, sha, message) {
      return request(`${base}/contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({ message, content: b64encode(text), sha, branch: BRANCH }),
      });
    },
    async lastRun() {
      const res = await request(`${base}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=10`);
      return res.workflow_runs.find(run => !(run.display_title || '').startsWith('probe:')) || res.workflow_runs[0] || null;
    },
    async listRuns() {
      const res = await request(`${base}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=10`);
      return res.workflow_runs || [];
    },
    async dispatch(inputs = null) {
      return request(`${base}/actions/workflows/${WORKFLOW_FILE}/dispatches`, {
        method: 'POST',
        body: JSON.stringify({ ref: BRANCH, ...(inputs ? { inputs } : {}) }),
      });
    },
  };
}

// ---------- helpers ----------
function relativeTime(iso) {
  if (!iso) return 'never';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
  return `${Math.floor(diff / 86400)} d ago`;
}

function statusPresentation(run) {
  if (!run) return { text: '—', kind: 'idle' };
  if (run.status === 'in_progress') return { text: 'running', kind: 'prog' };
  if (run.status === 'queued' || run.status === 'waiting') return { text: 'queued', kind: 'prog' };
  const c = run.conclusion;
  if (c === 'success')  return { text: 'success', kind: 'ok' };
  if (c === 'failure' || c === 'startup_failure') return { text: 'failed', kind: 'err' };
  if (c === 'cancelled' || c === 'timed_out') return { text: c.replace('_', ' '), kind: 'err' };
  return { text: c || run.status || '—', kind: 'idle' };
}

const formatUrl = (template, chapter) => template.replace('{chapter}', chapter);

// ---------- error boundary ----------
class ErrorBoundary extends React.Component {
  state = { error: null };
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return h`
        <div className="gate" role="alert">
          <h1>⚠️ Something broke</h1>
          <p>${this.state.error.message}</p>
          <div className="gate-actions">
            <button onClick=${() => location.reload()}>Reload</button>
          </div>
        </div>
      `;
    }
    return this.props.children;
  }
}

// ---------- components ----------
function TokenGate({ onSave }) {
  const [value, setValue] = useState('');
  const tokenId = useId();
  const repoSlug = `${REPO.owner}/${REPO.repo}`;
  return h`
    <div className="gate">
      <h1>📖 Manga Checker</h1>
      <p>Paste a GitHub fine-grained PAT with <strong>Contents</strong> and <strong>Actions</strong> read/write access on <code>${repoSlug}</code>.</p>
      <label htmlFor=${tokenId}>Personal access token</label>
      <input id=${tokenId} type="password" placeholder="github_pat_..."
             autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck=${false}
             value=${value}
             onChange=${ev => setValue(ev.target.value)}
             onKeyDown=${ev => { if (ev.key === 'Enter' && value) onSave(value); }} />
      <div className="gate-actions">
        <button className="primary" onClick=${() => value && onSave(value)} disabled=${!value}>Save & continue</button>
      </div>
      <p className="hint-footnote">Stored only in this browser. Sign out to clear it.</p>
    </div>
  `;
}

function MangaCard({ sub, lastChapter, onEdit, onRemove }) {
  const [armed, setArmed] = useState(false);
  const readUrl = lastChapter > 0 ? formatUrl(sub.url, lastChapter) : null;

  useEffect(() => {
    if (!armed) return;
    const t = setTimeout(() => setArmed(false), 3000);
    return () => clearTimeout(t);
  }, [armed]);

  function handleRemoveClick() {
    if (armed) { onRemove(); setArmed(false); }
    else setArmed(true);
  }

  return h`
    <div className="card">
      <h2>${sub.name}</h2>
      <div className="status">
        <span className="chip">Ch. ${lastChapter || '—'}</span>
        <span>${sub.notify ? '🔔 notify' : '🔕 silent'}</span>
      </div>
      <div className="row">
        ${readUrl ? h`<a href=${readUrl} target="_blank" rel="noopener"><button>Read</button></a>` : null}
        <button onClick=${onEdit}>Edit</button>
        <button
          className=${`danger ${armed ? 'armed' : ''}`}
          onClick=${handleRemoveClick}
          aria-label=${armed ? `Confirm remove ${sub.name}` : `Remove ${sub.name}`}
        >
          ${armed ? 'Tap again to confirm' : 'Remove'}
        </button>
      </div>
    </div>
  `;
}

function AddEditModal({ initial, isAdd, existingNames, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || '');
  const [url, setUrl] = useState(initial?.url || '');
  const [notify, setNotify] = useState(initial?.notify ?? true);
  const [lastChapter, setLastChapter] = useState(initial?.lastChapter ?? 0);
  const [saving, setSaving] = useState(false);

  const nameId = useId();
  const urlId = useId();
  const notifyId = useId();
  const chapterId = useId();
  const titleId = useId();
  const firstFieldRef = useRef(null);

  useEffect(() => {
    const prevFocus = document.activeElement;
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    firstFieldRef.current?.focus();
    const onKey = (ev) => { if (ev.key === 'Escape') onCancel(); };
    window.addEventListener('keydown', onKey);
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = prevOverflow;
      if (prevFocus && typeof prevFocus.focus === 'function') prevFocus.focus();
    };
  }, [onCancel]);

  const nameConflict = isAdd && existingNames.includes(name.trim());
  const urlValid = url.includes('{chapter}');
  const chapterValid = Number(lastChapter) > 0;
  const canSave = name.trim() && urlValid && !nameConflict && !saving && chapterValid;

  async function handleSave() {
    setSaving(true);
    try {
      await onSave({ name: name.trim(), url: url.trim(), notify, lastChapter: Number(lastChapter) || 0 });
    } catch (err) {
      setSaving(false);
      alert(err.message);
    }
  }

  const nextChapter = (Number(lastChapter) || 0) + 1;

  return h`
    <div className="modal-bg" onClick=${(ev) => { if (ev.target === ev.currentTarget) onCancel(); }}>
      <div className="modal" role="dialog" aria-modal="true" aria-labelledby=${titleId}>
        <h2 id=${titleId}>${isAdd ? 'Add series' : 'Edit series'}</h2>
        <p className="hint" style=${{ marginTop: 0, marginBottom: '6px' }}>
          ${isAdd ? 'Track a new manga by URL pattern.' : 'Update metadata or last-known chapter.'}
        </p>

        <label htmlFor=${nameId}>Name</label>
        <input id=${nameId} ref=${firstFieldRef} type="text" value=${name}
               onChange=${ev => setName(ev.target.value)} disabled=${!isAdd}
               placeholder="e.g. Eternally Regressing Knight" />
        ${nameConflict ? h`<div className="field-error" role="alert">A series with this name already exists.</div>` : null}

        <label htmlFor=${urlId}>URL template</label>
        <input id=${urlId} type="url" value=${url}
               autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck=${false}
               onChange=${ev => setUrl(ev.target.value)}
               placeholder="https://example.com/series-chapter-{chapter}/" />
        <div className="hint">Must contain <code>{chapter}</code> as the placeholder.</div>
        ${url && !urlValid ? h`<div className="field-error" role="alert">Missing <code>{chapter}</code> placeholder.</div>` : null}

        <label className="inline" htmlFor=${notifyId}>
          <input id=${notifyId} type="checkbox" checked=${notify} onChange=${ev => setNotify(ev.target.checked)} />
          <span>Notify on new chapter</span>
        </label>

        <label htmlFor=${chapterId}>Last known chapter</label>
        <input id=${chapterId} type="number" min="0" inputMode="numeric" value=${lastChapter}
               onChange=${ev => setLastChapter(ev.target.value)} />
        <div className="hint">Next check will probe chapter ${nextChapter}.</div>
        ${!chapterValid ? h`<div className="field-error" role="alert">Enter a known current chapter above 0.</div>` : null}

        <div className="actions">
          <button onClick=${onCancel} disabled=${saving}>Cancel</button>
          <button className="primary" onClick=${handleSave} disabled=${!canSave}>
            ${saving
              ? h`<${React.Fragment}><span className="spinner" aria-hidden="true"></span><span>Saving</span><//>`
              : 'Save'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function Toast({ message }) {
  if (!message) return null;
  return h`<div className="toast" role="status" aria-live="polite">${message}</div>`;
}

// ---------- App ----------
function App() {
  const [pat, setPat] = useState(() => localStorage.getItem('gh_pat') || '');
  const [subs, setSubs] = useState([]);
  const [subsSha, setSubsSha] = useState(null);
  const [state, setState] = useState({});
  const [stateSha, setStateSha] = useState(null);
  const [lastRun, setLastRun] = useState(null);
  const [loading, setLoading] = useState(false);
  const [initialized, setInitialized] = useState(false);
  const [error, setError] = useState(null);
  const [cooldown, setCooldown] = useState(false);
  const [editing, setEditing] = useState(null);
  const [toast, setToast] = useState(null);

  const api = useMemo(() => (pat ? makeApi(pat) : null), [pat]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(t => (t === msg ? null : t)), 2400);
  }

  const loadAll = useCallback(async () => {
    if (!api) return;
    setLoading(true);
    setError(null);
    try {
      const [subsRes, stateRes, runRes] = await Promise.all([
        api.getContents('config/subscription.yaml'),
        api.getContents('src/state.json').catch(e => e.status === 404 ? { text: '{}', sha: null } : Promise.reject(e)),
        api.lastRun().catch(() => null),
      ]);
      const parsedSubs = (yaml.load(subsRes.text) || {}).subscription || [];
      setSubs(parsedSubs.filter(s => s && s.name && s.url));
      setSubsSha(subsRes.sha);
      setState(JSON.parse(stateRes.text || '{}'));
      setStateSha(stateRes.sha);
      setLastRun(runRes);
    } catch (e) {
      setError(e.message);
      if (e.status === 401) {
        localStorage.removeItem('gh_pat');
        setPat('');
      }
    } finally {
      setLoading(false);
      setInitialized(true);
    }
  }, [api]);

  useEffect(() => { loadAll(); }, [loadAll]);

  useEffect(() => {
    if (!cooldown) return;
    const t = setTimeout(() => setCooldown(false), 10000);
    return () => clearTimeout(t);
  }, [cooldown]);

  async function persistSubs(nextSubs, message) {
    const text = yaml.dump({ subscription: nextSubs }, { lineWidth: 120 });
    try {
      const res = await api.putContents('config/subscription.yaml', text, subsSha, message);
      setSubs(nextSubs);
      setSubsSha(res.content.sha);
    } catch (e) {
      if (e.status === 409 || e.status === 422) {
        showToast('Config changed elsewhere — reloading');
        await loadAll();
      }
      throw e;
    }
  }

  async function persistState(nextState, message) {
    const text = JSON.stringify(nextState, null, 2) + '\n';
    let sha = stateSha;
    if (!sha) {
      try {
        const cur = await api.getContents('src/state.json');
        sha = cur.sha;
      } catch (e) { if (e.status !== 404) throw e; }
    }
    const res = await api.putContents('src/state.json', text, sha, message);
    setState(nextState);
    setStateSha(res.content.sha);
  }

  async function waitForProbe(name, expectedChapter, startedAt) {
    const deadline = Date.now() + 180000;
    while (Date.now() < deadline) {
      const [stateRes, runs] = await Promise.all([
        api.getContents('src/state.json').catch(e => e.status === 404 ? { text: '{}', sha: null } : Promise.reject(e)),
        api.listRuns().catch(() => []),
      ]);
      const parsedState = JSON.parse(stateRes.text || '{}');
      const entry = parsedState[name];
      if (entry && entry.last_chapter === expectedChapter && entry.strategy && entry.strategy.method) {
        setState(parsedState);
        setStateSha(stateRes.sha);
        return parsedState;
      }

      const probeRun = runs.find(run =>
        (run.display_title || '').startsWith(`probe: ${name}`) &&
        new Date(run.created_at).getTime() >= startedAt - 1000
      );
      if (probeRun && probeRun.status === 'completed' && probeRun.conclusion !== 'success') {
        throw new Error(`Probe failed: ${probeRun.conclusion}`);
      }

      await new Promise(resolve => setTimeout(resolve, 3000));
    }
    throw new Error('Probe timed out before state.json was updated.');
  }

  async function handleSave(form) {
    const existing = subs.find(s => s.name === form.name);
    let currentState = state;
    if (!existing) {
      const startedAt = Date.now();
      showToast('Probing site…');
      await api.dispatch({
        mode: 'probe',
        name: form.name,
        url: form.url,
        known_chapter: String(form.lastChapter),
      });
      currentState = await waitForProbe(form.name, form.lastChapter, startedAt);
    }

    const nextSubs = existing
      ? subs.map(s => s.name === form.name ? { name: form.name, url: form.url, notify: form.notify } : s)
      : [...subs, { name: form.name, url: form.url, notify: form.notify }];
    await persistSubs(nextSubs, `chore(ui): ${existing ? 'update' : 'add'} ${form.name}`);
    const prevChapter = currentState[form.name]?.last_chapter ?? 0;
    if (form.lastChapter !== prevChapter) {
      await persistState({
        ...currentState,
        [form.name]: {
          ...(currentState[form.name] || {}),
          last_chapter: form.lastChapter,
        },
      }, `chore(ui): set ${form.name} chapter to ${form.lastChapter}`);
    }
    setEditing(null);
    showToast(existing ? 'Saved' : `Added ${form.name} with ${currentState[form.name]?.strategy?.method || 'detected'} strategy`);
  }

  async function handleRemove(name) {
    try {
      await persistSubs(subs.filter(s => s.name !== name), `chore(ui): remove ${name}`);
      if (state[name]) {
        const nextState = { ...state };
        delete nextState[name];
        await persistState(nextState, `chore(ui): remove ${name} state`);
      }
      showToast(`Removed ${name}`);
    } catch (e) {
      alert(e.message);
    }
  }

  async function handleCheckNow() {
    try {
      await api.dispatch();
      setCooldown(true);
      showToast('Check queued');
      setTimeout(loadAll, 6000);
    } catch (e) {
      alert(e.message);
    }
  }

  function handleSignOut() {
    if (!confirm('Clear stored PAT?')) return;
    localStorage.removeItem('gh_pat');
    setPat('');
  }

  if (!pat) {
    return h`<${TokenGate} onSave=${v => { localStorage.setItem('gh_pat', v); setPat(v); }} />`;
  }

  const runUI = statusPresentation(lastRun);
  const showSkeleton = loading && !initialized;

  return h`
    <div className="app">
      <div className="header">
        <h1>📖 Manga Checker</h1>
        <div className="header-actions">
          <button className="icon" onClick=${loadAll} disabled=${loading} aria-label="Refresh">
            ${loading ? h`<span className="spinner" aria-hidden="true"></span>` : '⟳'}
          </button>
          <button className="icon" onClick=${handleSignOut} aria-label="Sign out">⎋</button>
        </div>
      </div>

      <div className="meta">
        ${lastRun
          ? h`<span className=${`dot ${runUI.kind}`} aria-hidden="true"></span>
              Last checked ${relativeTime(lastRun.updated_at)} · <a href=${lastRun.html_url} target="_blank" rel="noopener">${runUI.text}</a>`
          : initialized ? "Hasn't checked yet." : 'Loading…'}
      </div>

      ${error ? h`<div className="error" role="alert">${error}</div>` : null}

      ${showSkeleton
        ? h`<${React.Fragment}>
            <div className="skeleton" aria-hidden="true"></div>
            <div className="skeleton" aria-hidden="true"></div>
            <div className="skeleton" aria-hidden="true"></div>
          <//>`
        : subs.length === 0
          ? h`<div className="empty">
              <div className="empty-emoji" aria-hidden="true">📚</div>
              <h3>Nothing tracked yet</h3>
              <p>Add your first series to start watching for new chapters.</p>
            </div>`
          : subs.map(sub => h`<${MangaCard}
              key=${sub.name}
              sub=${sub}
              lastChapter=${state[sub.name]?.last_chapter || 0}
              onEdit=${() => setEditing({ isAdd: false, sub: { ...sub, lastChapter: state[sub.name]?.last_chapter || 0 } })}
              onRemove=${() => handleRemove(sub.name)}
            />`)
      }

      <div className="bar">
        <button className="primary" onClick=${() => setEditing({ isAdd: true })}>+ Add series</button>
        <button onClick=${handleCheckNow} disabled=${cooldown}>
          ${cooldown
            ? h`<${React.Fragment}><span className="spinner" aria-hidden="true"></span><span>Queued</span><//>`
            : '▶ Check now'}
        </button>
      </div>

      ${editing ? h`<${AddEditModal}
        isAdd=${editing.isAdd}
        initial=${editing.sub}
        existingNames=${subs.map(s => s.name)}
        onSave=${handleSave}
        onCancel=${() => setEditing(null)}
      />` : null}

      <${Toast} message=${toast} />
    </div>
  `;
}

createRoot(document.getElementById('root')).render(h`<${ErrorBoundary}><${App} /><//>`);
</script>
</body>
</html>
