<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Manga Checker</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #0f1115;
    --surface: #181b22;
    --surface-2: #242934;
    --border: #2a2f3a;
    --text: #e8ebf0;
    --muted: #8b93a7;
    --accent: #7aa2f7;
    --accent-fg: #0f1115;
    --danger: #f7768e;
    --ok: #9ece6a;
    --warn: #e0af68;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fa;
      --surface: #fff;
      --surface-2: #f0f2f6;
      --border: #e3e6ec;
      --text: #1a1d24;
      --muted: #5f6775;
      --accent: #3d5afe;
      --accent-fg: #fff;
      --danger: #d23f57;
      --ok: #2e8b3e;
      --warn: #b67214;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); }
  button { font: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); padding: 6px 12px; border-radius: 6px; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  button.danger { color: var(--danger); }
  input[type=text], input[type=number], input[type=password], input[type=url] {
    font: inherit; background: var(--surface); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; width: 100%;
  }
  label { display: block; margin: 10px 0 4px; color: var(--muted); font-size: 13px; }
  .app { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }
  .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .header h1 { font-size: 18px; margin: 0; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card h2 { font-size: 16px; margin: 0 0 4px; }
  .card .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .status { font-size: 13px; color: var(--muted); }
  .status .chip { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--surface-2); margin-right: 6px; }
  .bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; justify-content: center; }
  .error { color: var(--danger); padding: 10px; background: var(--surface); border: 1px solid var(--danger); border-radius: 8px; margin-bottom: 12px; }
  .muted { color: var(--muted); }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .field-error { color: var(--danger); font-size: 12px; }
  .hint { font-size: 12px; color: var(--muted); }
  .hint-footnote { font-size: 12px; color: var(--muted); margin-top: 16px; }
  .gate-actions { margin-top: 14px; display: flex; justify-content: flex-end; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 10; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; max-width: 480px; width: 100%; }
  .modal h2 { margin: 0 0 10px; font-size: 17px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .gate { max-width: 440px; margin: 60px auto; padding: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .gate h1 { margin-top: 0; font-size: 20px; }
  .gate p { color: var(--muted); font-size: 14px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React, { useState, useEffect, useCallback } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import htm from 'https://esm.sh/htm@3.1.1';
import yaml from 'https://esm.sh/js-yaml@4.1.0';

const h = htm.bind(React.createElement);
const e = React.createElement;

// ---------- repo targeting ----------
function detectRepo() {
  const host = location.hostname;
  const path = location.pathname.split('/').filter(Boolean);
  if (host.endsWith('.github.io') && path.length >= 1) {
    return { owner: host.split('.')[0], repo: path[0] };
  }
  // local dev fallback — edit this block to match your repo
  return { owner: 'REPLACE_ME', repo: 'comic-checker' };
}
const REPO = detectRepo();
const WORKFLOW_FILE = 'check-manga.yml';
const BRANCH = 'master';

// ---------- GitHub API ----------
function makeApi(pat) {
  const base = `https://api.github.com/repos/${REPO.owner}/${REPO.repo}`;
  const headers = {
    'Authorization': `Bearer ${pat}`,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
  };

  async function request(url, opts = {}) {
    const r = await fetch(url, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
    if (!r.ok) {
      const body = await r.text();
      const err = new Error(`${r.status} ${r.statusText}: ${body.slice(0, 200)}`);
      err.status = r.status;
      throw err;
    }
    if (r.status === 204) return null;
    return r.json();
  }

  function b64encode(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64decode(str) {
    return decodeURIComponent(escape(atob(str.replace(/\n/g, ''))));
  }

  return {
    async getContents(path) {
      const res = await request(`${base}/contents/${path}?ref=${BRANCH}`);
      return { text: b64decode(res.content), sha: res.sha };
    },
    async putContents(path, text, sha, message) {
      return request(`${base}/contents/${path}`, {
        method: 'PUT',
        body: JSON.stringify({ message, content: b64encode(text), sha, branch: BRANCH }),
      });
    },
    async lastRun() {
      const res = await request(`${base}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=1`);
      return res.workflow_runs[0] || null;
    },
    async dispatch() {
      return request(`${base}/actions/workflows/${WORKFLOW_FILE}/dispatches`, {
        method: 'POST',
        body: JSON.stringify({ ref: BRANCH }),
      });
    },
  };
}

// ---------- helpers ----------
function relativeTime(iso) {
  if (!iso) return 'never';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
  return `${Math.floor(diff / 86400)} d ago`;
}

function formatUrl(template, chapter) {
  return template.replace('{chapter}', chapter);
}

// ---------- components ----------
function TokenGate({ onSave }) {
  const [value, setValue] = useState('');
  const repoSlug = `${REPO.owner}/${REPO.repo}`;

  return e('div', { className: 'gate' }, [
    e('h1', { key: 'title' }, '📖 Manga Checker'),
    e('p', { key: 'intro' }, [
      'Paste a GitHub fine-grained PAT with ',
      e('strong', { key: 'contents' }, 'Contents: Read & Write'),
      ' and ',
      e('strong', { key: 'actions' }, 'Actions: Read & Write'),
      ' on ',
      e('code', { key: 'repo' }, repoSlug),
      '.',
    ]),
    e('label', { key: 'label' }, 'Personal Access Token'),
    e('input', {
      key: 'input',
      type: 'password',
      placeholder: 'github_pat_...',
      value,
      onChange: event => setValue(event.target.value),
      onKeyDown: event => {
        if (event.key === 'Enter' && value) {
          onSave(value);
        }
      },
    }),
    e('div', { key: 'actions', className: 'gate-actions' }, [
      e(
        'button',
        {
          key: 'save',
          className: 'primary',
          onClick: () => value && onSave(value),
          disabled: !value,
        },
        'Save & continue',
      ),
    ]),
    e('p', { key: 'footnote', className: 'hint-footnote' }, [
      'Stored in ',
      e('code', { key: 'storage' }, 'localStorage'),
      '. Sign out by clearing it (button in header).',
    ]),
  ]);
}

function MangaCard({ sub, lastChapter, onEdit, onRemove }) {
  const readUrl = lastChapter > 0 ? formatUrl(sub.url, lastChapter) : null;
  return h`
    <div className="card">
      <h2>${sub.name}</h2>
      <div className="status">
        <span className="chip">Ch. ${lastChapter || '—'}</span>
        <span>${sub.notify ? '🔔 notify on' : '🔕 notify off'}</span>
      </div>
      <div className="row">
        ${readUrl ? h`<a href=${readUrl} target="_blank" rel="noopener"><button>Read</button></a>` : null}
        <button onClick=${onEdit}>Edit</button>
        <button className="danger" onClick=${onRemove}>Remove</button>
      </div>
    </div>
  `;
}

function AddEditModal({ initial, isAdd, existingNames, onSave, onCancel }) {
  const [name, setName] = useState(initial?.name || '');
  const [url, setUrl] = useState(initial?.url || '');
  const [notify, setNotify] = useState(initial?.notify ?? true);
  const [lastChapter, setLastChapter] = useState(initial?.lastChapter ?? 0);
  const [saving, setSaving] = useState(false);

  const nameConflict = isAdd && existingNames.includes(name.trim());
  const urlValid = url.includes('{chapter}');
  const canSave = name.trim() && urlValid && !nameConflict && !saving;

  async function handleSave() {
    setSaving(true);
    try {
      await onSave({
        name: name.trim(),
        url: url.trim(),
        notify,
        lastChapter: Number(lastChapter) || 0,
      });
    } catch (e) {
      setSaving(false);
      alert(e.message);
    }
  }

  return h`
    <div className="modal-bg" onClick=${e => { if (e.target === e.currentTarget) onCancel(); }}>
      <div className="modal">
        <h2>${isAdd ? 'Add series' : 'Edit series'}</h2>

        <label>Name</label>
        <input type="text" value=${name} onChange=${e => setName(e.target.value)} disabled=${!isAdd} />
        ${nameConflict ? h`<div className="field-error">Name already exists.</div>` : null}

        <label>URL template (must contain <code>{chapter}</code>)</label>
        <input type="url" value=${url} onChange=${e => setUrl(e.target.value)}
               placeholder="https://example.com/series-chapter-{chapter}/" />
        ${url && !urlValid ? h`<div className="field-error">Missing {chapter} placeholder.</div>` : null}

        <label>
          <input type="checkbox" checked=${notify} onChange=${e => setNotify(e.target.checked)} /> Notify on new chapter
        </label>

        <label>Last known chapter</label>
        <input type="number" min="0" value=${lastChapter} onChange=${e => setLastChapter(e.target.value)} />
        <div className="hint">Checker probes chapter N+1 next.</div>

        <div className="actions">
          <button onClick=${onCancel} disabled=${saving}>Cancel</button>
          <button className="primary" onClick=${handleSave} disabled=${!canSave}>${saving ? h`<span className="spinner"></span>` : 'Save'}</button>
        </div>
      </div>
    </div>
  `;
}

// ---------- App ----------
function App() {
  const [pat, setPat] = useState(() => localStorage.getItem('gh_pat') || '');
  const [subs, setSubs] = useState([]);
  const [subsSha, setSubsSha] = useState(null);
  const [state, setState] = useState({});
  const [stateSha, setStateSha] = useState(null);
  const [lastRun, setLastRun] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [dispatchedAt, setDispatchedAt] = useState(0);
  const [editing, setEditing] = useState(null);

  const api = pat ? makeApi(pat) : null;

  const loadAll = useCallback(async () => {
    if (!api) return;
    setLoading(true);
    setError(null);
    try {
      const [subsRes, stateRes, runRes] = await Promise.all([
        api.getContents('config/subscription.yaml'),
        api.getContents('src/state.json').catch(e => e.status === 404 ? { text: '{}', sha: null } : Promise.reject(e)),
        api.lastRun().catch(() => null),
      ]);
      const parsedSubs = (yaml.load(subsRes.text) || {}).subscription || [];
      setSubs(parsedSubs.filter(s => s && s.name && s.url));
      setSubsSha(subsRes.sha);
      setState(JSON.parse(stateRes.text || '{}'));
      setStateSha(stateRes.sha);
      setLastRun(runRes);
    } catch (e) {
      setError(e.message);
      if (e.status === 401) {
        localStorage.removeItem('gh_pat');
        setPat('');
      }
    } finally {
      setLoading(false);
    }
  }, [pat]);

  useEffect(() => { loadAll(); }, [loadAll]);

  async function persistSubs(nextSubs, message) {
    const text = yaml.dump({ subscription: nextSubs }, { lineWidth: 120 });
    try {
      const res = await api.putContents('config/subscription.yaml', text, subsSha, message);
      setSubs(nextSubs);
      setSubsSha(res.content.sha);
    } catch (e) {
      if (e.status === 409 || e.status === 422) {
        alert('Config changed externally — refresh and retry.');
        await loadAll();
      }
      throw e;
    }
  }

  async function persistState(nextState, message) {
    const text = JSON.stringify(nextState, null, 2) + '\n';
    let sha = stateSha;
    if (!sha) {
      try {
        const cur = await api.getContents('src/state.json');
        sha = cur.sha;
      } catch (e) { if (e.status !== 404) throw e; }
    }
    const res = await api.putContents('src/state.json', text, sha, message);
    setState(nextState);
    setStateSha(res.content.sha);
  }

  async function handleSave(form) {
    const existing = subs.find(s => s.name === form.name);
    const nextSubs = existing
      ? subs.map(s => s.name === form.name ? { name: form.name, url: form.url, notify: form.notify } : s)
      : [...subs, { name: form.name, url: form.url, notify: form.notify }];

    await persistSubs(nextSubs, `chore(ui): ${existing ? 'update' : 'add'} ${form.name}`);

    const prevChapter = state[form.name] ?? 0;
    if (form.lastChapter !== prevChapter) {
      await persistState({ ...state, [form.name]: form.lastChapter }, `chore(ui): set ${form.name} chapter to ${form.lastChapter}`);
    }
    setEditing(null);
  }

  async function handleRemove(name) {
    if (!confirm(`Remove "${name}"?`)) return;
    try {
      await persistSubs(subs.filter(s => s.name !== name), `chore(ui): remove ${name}`);
    } catch (e) {
      alert(e.message);
    }
  }

  async function handleCheckNow() {
    try {
      await api.dispatch();
      setDispatchedAt(Date.now());
      setTimeout(loadAll, 6000);
    } catch (e) {
      alert(e.message);
    }
  }

  function handleSignOut() {
    if (!confirm('Clear stored PAT?')) return;
    localStorage.removeItem('gh_pat');
    setPat('');
  }

  if (!pat) {
    return h`<${TokenGate} onSave=${v => { localStorage.setItem('gh_pat', v); setPat(v); }} />`;
  }

  const dispatchCooldown = dispatchedAt && (Date.now() - dispatchedAt < 10000);

  return h`
    <div className="app">
      <div className="header">
        <h1>📖 Manga Checker</h1>
        <div className="header-actions">
          <button onClick=${loadAll} disabled=${loading} title="Refresh">${loading ? h`<span className="spinner"></span>` : '⟳'}</button>
          <button onClick=${handleSignOut} title="Sign out">⎋</button>
        </div>
      </div>

      <div className="meta">
        ${lastRun
          ? h`Last run: ${relativeTime(lastRun.updated_at)} · <a href=${lastRun.html_url} target="_blank" rel="noopener">${lastRun.conclusion || lastRun.status}</a>`
          : 'No runs yet.'}
      </div>

      ${error ? h`<div className="error">${error}</div>` : null}

      ${subs.length === 0 && !loading
        ? h`<div className="empty">No subscriptions yet. Add one below.</div>`
        : subs.map(sub => h`<${MangaCard}
            key=${sub.name}
            sub=${sub}
            lastChapter=${state[sub.name] || 0}
            onEdit=${() => setEditing({ isAdd: false, sub: { ...sub, lastChapter: state[sub.name] || 0 } })}
            onRemove=${() => handleRemove(sub.name)}
          />`)}

      <div className="bar">
        <button className="primary" onClick=${() => setEditing({ isAdd: true })}>+ Add series</button>
        <button onClick=${handleCheckNow} disabled=${dispatchCooldown}>${dispatchCooldown ? 'Queued…' : '▶ Check now'}</button>
      </div>

      ${editing ? h`<${AddEditModal}
        isAdd=${editing.isAdd}
        initial=${editing.sub}
        existingNames=${subs.map(s => s.name)}
        onSave=${handleSave}
        onCancel=${() => setEditing(null)}
      />` : null}
    </div>
  `;
}

createRoot(document.getElementById('root')).render(h`<${App} />`);
</script>
</body>
</html>
