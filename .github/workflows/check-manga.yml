name: check-manga

on:
  # 08:00 / 14:00 / 20:00 Bangkok (ICT, UTC+7) = 01:00 / 07:00 / 13:00 UTC
  # GitHub may delay scheduled runs up to ~15 min; schedule runs only on the default branch.
  schedule:
    - cron: "0 1,7,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-manga
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run checker
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          LOG_LEVEL: INFO
        run: uv run python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore(state): update [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
