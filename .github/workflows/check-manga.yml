name: check-manga
run-name: "${{ github.event.inputs.mode == 'probe' && format('probe: {0}', github.event.inputs.name) || 'check' }}"

on:
  # 08:00 / 14:00 / 20:00 Bangkok (ICT, UTC+7) = 01:00 / 07:00 / 13:00 UTC
  # GitHub may delay scheduled runs up to ~15 min; schedule runs only on the default branch.
  schedule:
    - cron: "0 1,7,13 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: check or probe
        required: false
        default: check
        type: string
      name:
        description: Manga name for probe mode
        required: false
        type: string
      url:
        description: Manga URL template for probe mode
        required: false
        type: string
      known_chapter:
        description: Known good chapter for probe mode
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: check-manga
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run checker
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          LOG_LEVEL: INFO
          MODE: ${{ github.event.inputs.mode || 'check' }}
          PROBE_NAME: ${{ github.event.inputs.name || '' }}
          PROBE_URL: ${{ github.event.inputs.url || '' }}
          PROBE_KNOWN_CHAPTER: ${{ github.event.inputs.known_chapter || '' }}
        run: |
          if [ "$MODE" = "probe" ]; then
            uv run python main.py --mode probe --name "$PROBE_NAME" --url "$PROBE_URL" --known-chapter "$PROBE_KNOWN_CHAPTER"
          else
            uv run python main.py
          fi

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore(state): update [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
